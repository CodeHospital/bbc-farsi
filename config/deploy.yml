# Name of your application. Used to uniquely configure containers.
service: bbcfarsi

# Name of the container image.
image: your-user/bbcfarsi

# Deploy to these servers.
servers:
  web:
    - 192.168.0.1
  # LLM work is processed by a separate worker client that has access to Ollama
  # (see worker/README.md). It runs outside Kamal — wherever Ollama lives —
  # polling the protected /api/tasks endpoints. It is not a Kamal role here.

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:
  ssl: true
  host: app.example.com

# Credentials for your image host.
registry:
  # Specify the registry server, if you're not using Docker Hub
  # server: registry.digitalocean.com / ghcr.io / ...
  username: your-user

  # Always use an access token rather than real password when possible.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    # Shared bearer token the worker client uses to authenticate to /api/tasks.
    - WORKER_API_TOKEN
    # Full PostgreSQL connection string for the production database, e.g.
    # postgres://user:password@host:5432/bbcfarsi_production
    - DATABASE_URL
  clear:
    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2

    # Match this to any external database server to configure Active Record correctly
    # Use bbcfarsi-db for a db accessory server on same machine via local kamal docker network.
    # DB_HOST: 192.168.0.2

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"


# Persistent storage volume for local files (e.g. Active Storage). The database
# is PostgreSQL (DATABASE_URL), so no database files live here anymore.
volumes:
  - "bbcfarsi_storage:/rails/storage"


# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: ruby-3.3.8
  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use a different ssh user than root
# ssh:
#   user: app

# Use accessory services (secrets come from .kamal/secrets).
# Only needed if you self-host PostgreSQL on a server; managed Postgres just
# needs DATABASE_URL set in .kamal/secrets. Point DATABASE_URL at this host
# (e.g. postgres://postgres:PASSWORD@bbcfarsi-db:5432/bbcfarsi_production).
# accessories:
#   db:
#     image: postgres:16
#     host: 192.168.0.2
#     # Change to 5432 to expose port to the world instead of just local network.
#     port: "127.0.0.1:5432:5432"
#     env:
#       clear:
#         POSTGRES_USER: postgres
#         POSTGRES_DB: bbcfarsi_production
#       secret:
#         - POSTGRES_PASSWORD
#     directories:
#       - data:/var/lib/postgresql/data
