default: &default
  store_options:
    # Cap age of oldest cache entry to fulfill retention policies
    # max_age: <%= 60.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  <<: *default

test:
  <<: *default

production:
  # Solid Cache lives in the primary PostgreSQL database (no separate cache db),
  # so there is no `database:` key — it uses the default Active Record connection.
  <<: *default
