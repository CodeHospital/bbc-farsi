# Development and test use SQLite; production uses PostgreSQL via DATABASE_URL.
#
#   Local:      gem "sqlite3"  (group :development, :test)
#   Production: gem "pg"        (group :production) + ENV["DATABASE_URL"]
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3


# PostgreSQL in production. The connection is taken entirely from the
# DATABASE_URL environment variable (host, user, password, database). Solid
# Cache shares this same database (see config/cache.yml).
production:
  primary:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    url: <%= ENV["DATABASE_URL"] %>
